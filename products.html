            <div class="col-md-4">
                <h2>Your Cart</h2>
                {% if cart_items %}
                    <table class="table table-sm">
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>Qty</th>
                                <th>Subtotal</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for item in cart_items %}
                                <tr>
                                    <td>{{ item.product.name }}</td>
                                    <td>{{ item.quantity }}</td>
                                    <td>${{ item.subtotal }}</td>
                                    <td><a href="{{ url_for('remove_from_cart', product_id=item.product.id) }}" class="btn btn-sm btn-danger">Remove</a></td>
                                </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                    <h4>Total: ${{ "%.2f"|format(cart_total) }}</h4>
                    <a href="{{ url_for('checkout') }}" class="btn btn-success">Checkout</a>
                {% else %}
                    <p>Your cart is empty.</p>
                {% endif %}
            </div>
